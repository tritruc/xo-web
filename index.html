<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>XO Infinite</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="app">
    <header class="card">
      <h1>🎮 XO Infinite</h1>
      <p class="muted">Mobile-first • Bàn cờ không giới hạn • 5 quân liên tiếp thắng</p>
    </header>

    <section class="card controls">
      <select id="mode">
        <option value="ai">Đấu với máy</option>
        <option value="online">Đấu với người chơi khác (phòng)</option>
      </select>
      <button id="resetBtn">Ván mới</button>
      <button id="soundBtn" class="ghost">🔊 Sound</button>
    </section>

    <section class="card" id="roomPanel" hidden>
      <div class="row">
        <input id="roomInput" placeholder="Nhập số phòng (vd 5074)" />
        <button id="hostBtn" class="good">Tạo phòng</button>
        <button id="joinBtn" class="ghost">Vào phòng</button>
      </div>
      <p class="muted" id="roomStatus">Chưa kết nối phòng.</p>
    </section>

    <section class="card status">
      <span id="statusText">Lượt: X</span>
      <span id="roleText">Bạn: X</span>
    </section>

    <canvas id="board" width="720" height="920"></canvas>

    <section class="card row center">
      <button id="zoomIn">＋</button>
      <button id="zoomOut" class="ghost">－</button>
      <button id="centerBtn" class="ghost">Về tâm</button>
    </section>
  </main>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
